name: CI/CD Pipeline

on:
push:
branches:
- main
- master
pull_request:
branches:
- main
- master
workflow_dispatch:

jobs:
build-and-test:
name: Build Web Assets
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: ./app_ios

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"
      cache: npm
      cache-dependency-path: ./app_ios/package-lock.json

  - name: Install Dependencies
    run: npm ci

  - name: Build Application
    run: npm run build

  - name: Upload Build Artifacts
    uses: actions/upload-artifact@v4
    with:
      name: web-dist
      path: app_ios/dist
      retention-days: 7
```
