name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Cancel in-progress runs on PRs to save runner minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build & Test Web Application
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app_ios

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Current stable LTS
          cache: 'npm'
          cache-dependency-path: './app_ios/package-lock.json'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧹 Lint Code
        # Uses --if-present so the pipeline doesn't fail if a lint script isn't defined
        run: npm run lint --if-present

      - name: 🧪 Run Tests
        # Uses --if-present to gracefully handle missing test suites initially
        run: npm test --if-present

      - name: 🏗️ Build Web App (Vite/TypeScript)
        # Compiles TS and generates the production bundle in dist/
        run: npm run build

      - name: 📤 Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: app_ios/dist/
          retention-days: 7
          if-no-files-found: error

  build-ios-prep:
    name: Prepare & Sync iOS (Capacitor)
    runs-on: macos-latest
    needs: build-web
    defaults:
      run:
        working-directory: ./app_ios

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './app_ios/package-lock.json'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 📥 Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: app_ios/dist/

      - name: 🔄 Sync Capacitor iOS Project
        # Generates/updates the native iOS code with the freshly built web assets
        run: |
          npx cap sync ios

      # ----------------------------------------------------------------------
      # NOTE: For full App Store deployment, uncomment and configure the below.
      # This requires setting up Fastlane or standard xcodebuild commands along
      # with GitHub Secrets for provisioning profiles and certificates.
