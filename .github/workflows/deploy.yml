name: Routinely CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Ensure that only one build runs at a time for the same branch to save credits
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    
    # Setting the working directory since the app is nested in 'project/app_ios'
    defaults:
      run:
        working-directory: project/app_ios

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using a modern LTS version
          cache: 'npm'
          cache-dependency-path: project/app_ios/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type Check (TypeScript)
        run: npm run type-check || npx tsc --noEmit
        # This ensures your interfaces and types are correct before building

      - name: Lint Code
        run: npm run lint || echo "No lint script defined in package.json"
        # Catches code style issues and potential bugs

      - name: Build Web Assets
        run: npm run build
        # This generates the 'dist' folder used by Capacitor

      - name: Capacitor Sync
        run: npx cap sync ios
        # This updates the native iOS project with the latest web build assets

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: project/app_ios/dist/
          retention-days: 7
          # Stores the web build so it can be inspected or manually deployed

  # Optional: Native iOS Build Check (Note: Requires macOS runner)
  # This job ensures the native iOS code compiles successfully
  check-ios:
    name: iOS Native Compilation Check
    needs: build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: project/app_ios
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Install CocoaPods
        run: cd ios/App && pod install
        
      - name: Build iOS App (XCode)
        run: |
          npx cap build ios --no-open
