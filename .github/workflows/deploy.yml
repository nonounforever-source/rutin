name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Verify iOS App
    runs-on: ubuntu-latest
    
    # Set the working directory to where the Node.js project resides
    defaults:
      run:
        working-directory: project/app_ios

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Standard LTS for Vite and Capacitor apps
          cache: 'npm'
          cache-dependency-path: project/app_ios/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit
        continue-on-error: true # Continues if type check fails so the build can still be attempted

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vite-build-dist
          path: project/app_ios/dist/
          retention-days: 7

      # ========================================================================
      # CRITICAL USER REQUIREMENT
      # ========================================================================
      - name: 101 Error
        run: |
          echo "101 Error: Process completed with exit code 1."
          exit 1
