name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: find . -not -path "*/node_modules/*" -not -path "*/.git/*" | sort

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Find package.json
        run: |
          PKG=$(find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/.git/*" | head -1)
          if [ -z "$PKG" ]; then
            echo "ERROR: package.json not found"
            exit 1
          fi
          DIR=$(dirname "$PKG")
          echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          echo "Found in: $DIR"

      - name: Install dependencies
        run: cd $PROJECT_DIR && npm install

      - name: Build
        run: cd $PROJECT_DIR && npm run build

      - name: Add iOS platform
        run: |
          cd $PROJECT_DIR
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: cd $PROJECT_DIR && npx cap sync ios

      - name: Install CocoaPods
        run: cd $PROJECT_DIR/ios/App && pod install --repo-update

      - name: Archive
        run: |
          cd $PROJECT_DIR
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/App.xcarchive/Products/Applications/App.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r $RUNNER_TEMP/Routinely.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Routinely-IPA
          path: ${{ runner.temp }}/Routinely.ipa
          retention-days: 30
