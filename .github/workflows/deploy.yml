name: 🔨 Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Node.js ────────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── 3. اكتشاف مكان package.json تلقائياً ─────────────────────────────
      - name: 📂 Detect project root
        run: |
          if [ -f "app_ios/package.json" ]; then
            echo "PROJECT_DIR=app_ios" >> $GITHUB_ENV
            echo "✅ Found package.json in app_ios/"
          elif [ -f "package.json" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
            echo "✅ Found package.json in root"
          else
            echo "❌ package.json not found!"
            find . -name "package.json" -not -path "*/node_modules/*"
            exit 1
          fi

      # ─── 4. Install dependencies ───────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          cd $PROJECT_DIR
          npm install

      # ─── 5. Build web app ──────────────────────────────────────────────────
      - name: 🔨 Build web app
        run: |
          cd $PROJECT_DIR
          npm run build

      # ─── 6. Capacitor iOS ─────────────────────────────────────────────────
      - name: 📱 Add iOS platform
        run: |
          cd $PROJECT_DIR
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: 🔄 Sync Capacitor
        run: |
          cd $PROJECT_DIR
          npx cap sync ios

      # ─── 7. CocoaPods ─────────────────────────────────────────────────────
      - name: 🦪 Install CocoaPods
        run: |
          cd $PROJECT_DIR/ios/App
          pod install --repo-update

      # ─── 8. Build بدون توقيع ──────────────────────────────────────────────
      - name: 🏗️ Archive app (no signing)
        run: |
          cd $PROJECT_DIR
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty

      # ─── 9. Package IPA ───────────────────────────────────────────────────
      - name: 📦 Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" \
                "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r "$RUNNER_TEMP/Routinely.ipa" Payload/

      # ─── 10. Upload Artifact ──────────────────────────────────────────────
      - name: ⬆️ Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Routinely-IPA
          path: ${{ runner.temp }}/Routinely.ipa
          retention-days: 30

      - name: ✅ Done
        if: success()
        run: echo "🎉 الـ IPA جاهز! حمّله من Actions → Artifacts"
