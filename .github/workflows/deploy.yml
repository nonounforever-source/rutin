name: CI Build

# Trigger the workflow on pushes to the main branch and all pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    # Set the default working directory for all run steps
    # This ensures commands like 'npm ci' run inside the correct folder
    defaults:
      run:
        working-directory: project/app_ios

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      # We use actions/setup-node's built-in caching.
      # To fix the "paths not resolved" error, we explicitly point to the 
      # package-lock.json inside the subdirectory.
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using current LTS version
          cache: 'npm'
          cache-dependency-path: project/app_ios/package-lock.json

      # 3. Install dependencies
      # 'npm ci' is faster and more reliable than 'npm install' in CI environments
      - name: Install dependencies
        run: npm ci

      # 4. Run TypeScript type checking
      # This ensures there are no code errors before building
      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      # 5. Build the web assets
      # This runs the vite build process defined in project/app_ios/package.json
      - name: Build project
        run: npm run build

      # 6. Capacitor Sync (Optional/Production Ready)
      # Validates that the web build can be synced to native platforms
      - name: Capacitor Sync
        run: npx cap sync
