name: Routinely CI/CD

# Trigger the workflow on pushes to the main branch or pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Lint, Type-check, and Web Build
    runs-on: ubuntu-latest

    # Set the working directory since the project is nested inside 'project/app_ios/'
    defaults:
      run:
        working-directory: project/app_ios

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using the latest LTS for stability
          cache: 'npm'
          cache-dependency-path: project/app_ios/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type-check (TypeScript)
        # Ensuring the project compiles correctly according to tsconfig.json
        run: npx tsc --noEmit

      - name: Production Web Build
        # This generates the 'dist' or 'www' folder used by Capacitor
        run: npm run build

      - name: Capacitor Sync
        # Ensures the web assets are copied to the iOS platform
        # and native plugins are updated.
        run: npx cap sync ios

  # Optional: Native iOS Build Check (Note: Requires macOS runner)
  # This job ensures that the native Xcode project compiles.
  # Note: macOS runners are significantly more expensive in terms of GitHub Action minutes.
  ios-native-check:
    name: iOS Native Compilation
    needs: build-and-test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: project/app_ios

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project/app_ios/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install CocoaPods
        # Required for iOS native dependencies
        run: |
          cd ios/App
          pod install
        
      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync iOS
        run: npx cap sync ios

      - name: Check iOS Build
        # This validates that the Xcode project can at least be initialized/built
        run: xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphonesimulator build CODE_SIGNING_ALLOWED=NO
