name: iOS API App CI

'on':
  push:
    branches: [main, master]
  pull_request: {}

jobs:
  build-and-verify:
    name: Build, Lint, and Verify API configuration
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app_ios

    env:
      API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app_ios/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint / Type check - non-blocking
        run: npm run lint
        continue-on-error: true

      - name: Build web assets - non-blocking
        run: npm run build
        continue-on-error: true

      - name: Sync Capacitor iOS project when platform exists
        shell: bash
        run: |
          if [[ -d "ios/App" ]]; then
            npx cap sync ios
          else
            echo "::notice::Skipping iOS sync because ios/App is not present. Run 'npx cap add ios' first."
          fi

      - name: Check API base URL presence
        id: api_url
        shell: bash
        run: |
          if [[ -z "${API_BASE_URL}" ]]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::API_BASE_URL is not defined in repository variables. Skipping API health check."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "API_BASE_URL is configured."
          fi

      - name: API health check
        if: steps.api_url.outputs.present == 'true'
        shell: bash
        run: |
          STATUS=$(curl -sS -o /tmp/health_response.json -w "%{http_code}" "${API_BASE_URL}/health")
          if [[ "${STATUS}" -lt 200 || "${STATUS}" -ge 400 ]]; then
            echo "API health check failed with status ${STATUS}"
            cat /tmp/health_response.json
            exit 1
          fi
          echo "API health check passed with status ${STATUS}"
