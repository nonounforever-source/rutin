name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Verify iOS App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_ios

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app_ios/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Type Check (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build Project (non-blocking)
        run: npm run build
        continue-on-error: true

      - name: Upload Build Artifacts (if available)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vite-build-dist
          path: app_ios/dist/
          if-no-files-found: warn
          retention-days: 7
