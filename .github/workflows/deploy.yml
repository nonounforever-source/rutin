name: iOS API Workflow

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate-ios-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_ios/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build
