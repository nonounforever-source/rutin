name: 🔨 Build IPA for AltStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Node.js ────────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── 3. Install & Build ────────────────────────────────────────────────
      - name: 📦 Install dependencies
        working-directory: app_ios
        run: npm install

      - name: 🔨 Build web app
        working-directory: app_ios
        run: npm run build

      # ─── 4. Capacitor ─────────────────────────────────────────────────────
      - name: 📱 Add iOS platform
        working-directory: app_ios
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: 🔄 Sync Capacitor
        working-directory: app_ios
        run: npx cap sync ios

      # ─── 5. Install CocoaPods ──────────────────────────────────────────────
      - name: 🦪 Install CocoaPods
        working-directory: app_ios/ios/App
        run: pod install

      # ─── 6. Build IPA (بدون توقيع) ────────────────────────────────────────
      - name: 🏗️ Archive app
        working-directory: app_ios
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      # ─── 7. Export IPA ────────────────────────────────────────────────────
      - name: 📦 Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/IPA
          cd $RUNNER_TEMP/App.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r $RUNNER_TEMP/IPA/App.ipa Payload/

      # ─── 8. Upload IPA كـ Artifact ─────────────────────────────────────────
      - name: ⬆️ Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Routinely-IPA
          path: ${{ runner.temp }}/IPA/App.ipa
          retention-days: 30

      - name: ✅ Done
        if: success()
        run: echo "🎉 الـ IPA جاهز للتحميل من Actions!"
