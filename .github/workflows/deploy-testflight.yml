name: 🔨 Build IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        working-directory: app_ios
        run: npm install

      - name: 🔨 Build Web App
        working-directory: app_ios
        run: npm run build

      - name: 📱 Add iOS Platform
        working-directory: app_ios
        run: |
          npx cap add ios
          npx cap sync ios

      - name: 🔧 Install CocoaPods
        run: |
          cd app_ios/ios/App
          pod install

      - name: 🏗️ Build IPA
        working-directory: app_ios
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p $RUNNER_TEMP/payload/Payload
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" \
            "$RUNNER_TEMP/payload/Payload/App.app"
          cd $RUNNER_TEMP/payload
          zip -r App.ipa Payload

      - name: 💾 حفظ IPA
        uses: actions/upload-artifact@v4
        with:
          name: Routinely-IPA
          path: ${{ runner.temp }}/payload/App.ipa
          retention-days: 30
